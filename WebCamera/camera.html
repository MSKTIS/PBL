<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>Camera Overlay</title>

    <style>
        body {
            margin: 0;
            background: black;
            text-align: center;
        }

        canvas {
            width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        button {
            font-size: 24px;
            padding: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <video id="video" autoplay playsinline hidden></video>
    <canvas id="canvas"></canvas>

    <br>
    <button id="capture">撮影</button>

    <script>

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // シルエット画像
        const overlay = new Image();
        overlay.src = "/static/silhouette.png";

        async function startCamera() {

            try {

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: "environment" }
                    },
                    audio: false
                });

                video.srcObject = stream;

            } catch (err) {

                console.error(err);
                alert("カメラを起動できません");

            }
        }

        function draw() {

            // video準備前は描画しない
            if (video.readyState >= 2) {

                // 映像をcanvas全体へ
                ctx.drawImage(
                    video,
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

                // overlay描画
                if (overlay.complete) {

                    ctx.globalAlpha = 0.5;

                    const size = canvas.width * 0.5;

                    ctx.drawImage(
                        overlay,
                        (canvas.width - size) / 2,
                        (canvas.height - size) / 2,
                        size,
                        size
                    );

                    ctx.globalAlpha = 1.0;
                }
            }

            requestAnimationFrame(draw);
        }

        video.addEventListener("loadedmetadata", () => {

            // スマホで0になる対策
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            draw();
        });

        document.getElementById("capture").onclick = () => {

            canvas.toBlob(blob => {

                const formData = new FormData();
                formData.append("image", blob, "photo.png");

                fetch("/upload", {
                    method: "POST",
                    body: formData
                })
                    .then(res => {

                        if (!res.ok) {
                            throw new Error("upload failed");
                        }

                        alert("保存しました");
                    })
                    .catch(err => {

                        console.error(err);
                        alert("保存失敗");
                    });

            }, "image/png");
        };

        startCamera();

    </script>

</body>

</html>
